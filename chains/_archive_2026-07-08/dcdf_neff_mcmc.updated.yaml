params:
  omega_b:
    prior:
      min: 0.019
      max: 0.026
    ref: 0.0224
    proposal: 0.0001
    latex: \Omega_\mathrm{b} h^2
    renames:
    - omegabh2
  H0:
    prior:
      min: 55.0
      max: 85.0
    ref: 67.4
    proposal: 0.5
    latex: H_0
  logA:
    prior:
      min: 1.61
      max: 3.91
    ref: 3.05
    proposal: 0.001
    latex: \ln(10^{10} A_\mathrm{s})
    drop: true
  A_s:
    value: 'lambda logA: 1e-10 * np.exp(logA)'
    derived: true
    renames:
    - As
  n_s:
    prior:
      min: 0.8
      max: 1.2
    ref: 0.965
    proposal: 0.005
    latex: n_\mathrm{s}
    renames:
    - ns
  z_reio:
    prior:
      min: 5.0
      max: 12.0
    ref: 8.0
    proposal: 0.1
    latex: z_\mathrm{reio}
    renames:
    - zrei
  A_planck:
    prior:
      dist: norm
      loc: 1.0
      scale: 0.0025
    ref: 1.0
    proposal: 0.00025
    latex: A_\mathrm{planck}
    renames: calPlanck
  dcdf_rho_inf:
    prior:
      min: 0.01
      max: 0.95
    ref: 0.7
    proposal: 0.05
    latex: \rho_\infty
  Omega0_dcdf:
    value: 'lambda omega_b, H0: 1.0 - (omega_b) / (H0/100.0)**2'
    latex: \Omega_{0,\mathrm{dCDF}}
    derived: true
  xi_Neff:
    prior:
      min: 0.0
      max: 1.0
    ref: 0.2
    proposal: 0.05
    latex: \xi_{N_{\mathrm{eff}}}
  m_ncdm:
    value: 0.06
    latex: \sum m_\nu \ [\mathrm{eV}]
  chi2__BAO:
    latex: \chi^2_\mathrm{BAO}
    derived: true
  chi2__CMB:
    latex: \chi^2_\mathrm{CMB}
    derived: true
  chi2__SN:
    latex: \chi^2_\mathrm{SN}
    derived: true
sampler:
  mcmc:
    sampler_type: mcmc
    supports_periodic_params: true
    burn_in: 0
    max_tries: 1000
    covmat: null
    covmat_params: null
