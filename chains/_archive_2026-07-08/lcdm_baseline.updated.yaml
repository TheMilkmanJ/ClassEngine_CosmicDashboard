params:
  omega_b:
    prior:
      min: 0.019
      max: 0.026
    ref: 0.0224
    proposal: 0.0001
    latex: \Omega_\mathrm{b} h^2
    renames:
    - omegabh2
  omega_cdm:
    prior:
      min: 0.1
      max: 0.2
    ref: 0.12
    proposal: 0.001
    latex: \Omega_\mathrm{c} h^2
    renames:
    - omegach2
  H0:
    prior:
      min: 55.0
      max: 85.0
    ref: 67.4
    proposal: 0.5
    latex: H_0
  logA:
    prior:
      min: 1.61
      max: 3.91
    ref: 3.05
    proposal: 0.005
    latex: \ln(10^{10} A_\mathrm{s})
    drop: true
  A_s:
    value: 'lambda logA: 1e-10 * np.exp(logA)'
    latex: A_\mathrm{s}
    derived: true
    renames:
    - As
  n_s:
    prior:
      min: 0.8
      max: 1.2
    ref: 0.965
    proposal: 0.004
    latex: n_\mathrm{s}
    renames:
    - ns
  z_reio:
    prior:
      min: 5.0
      max: 12.0
    ref: 8.0
    proposal: 0.1
    latex: z_\mathrm{reio}
    renames:
    - zrei
  m_ncdm:
    value: 0.06
    latex: \sum m_\nu \ [\mathrm{eV}]
  A_planck:
    prior:
      dist: norm
      loc: 1.0
      scale: 0.0025
    ref: 1.0
    proposal: 0.0002
    latex: A_\mathrm{planck}
    renames: calPlanck
  sigma8:
    latex: \sigma_8
    derived: true
  Omega_m:
    latex: \Omega_\mathrm{m}
    derived: true
    renames:
    - omegam
  S8:
    derived: 'lambda sigma8, Omega_m: sigma8 * (Omega_m / 0.3)**0.5'
    latex: S_8
  chi2__BAO:
    latex: \chi^2_\mathrm{BAO}
    derived: true
  chi2__CMB:
    latex: \chi^2_\mathrm{CMB}
    derived: true
  chi2__SN:
    latex: \chi^2_\mathrm{SN}
    derived: true
