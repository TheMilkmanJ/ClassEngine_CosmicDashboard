theory:
  classy:
    path: /home/themilkmanj/prtoe_class
    stop_at_error: false
    extra_args:
      use_dcdf: 'yes'
      non_linear: halofit
      output: mPk,tCl,pCl,lCl
      modes: s
      N_ur: 2.0328
      N_ncdm: 1
      T_ncdm: 0.71611
      l_max_scalars: 2508
      lensing: 'yes'
      dcdf_beta: 1.0e-07
likelihood:
  planck_2018_lowl.TT: null
  planck_2018_lowl.EE: null
  planck_2018_highl_plik.TTTEEE_lite: null
  planck_2018_lensing.clik: null
  bao.sixdf_2011_bao: null
  bao.sdss_dr7_mgs: null
  bao.sdss_dr12_consensus_final: null
  sn.pantheonplusshoes: null
params:
  omega_b:
    prior:
      min: 0.019
      max: 0.026
    ref: 0.0224
    proposal: 0.0001
    latex: \Omega_\mathrm{b} h^2
  H0:
    prior:
      min: 55.0
      max: 85.0
    ref: 67.4
    proposal: 0.5
    latex: H_0
  logA:
    prior:
      min: 1.61
      max: 3.91
    ref: 3.05
    proposal: 0.001
    latex: \ln(10^{10} A_\mathrm{s})
    drop: true
  A_s:
    value: 'lambda logA: 1e-10 * np.exp(logA)'
  n_s:
    prior:
      min: 0.8
      max: 1.2
    ref: 0.965
    proposal: 0.005
    latex: n_\mathrm{s}
  z_reio:
    prior:
      min: 5.0
      max: 12.0
    ref: 8.0
    proposal: 0.1
    latex: z_\mathrm{reio}
  A_planck:
    prior:
      dist: norm
      loc: 1.0
      scale: 0.0025
    ref: 1.0
    proposal: 0.00025
    latex: A_\mathrm{planck}
  dcdf_rho_inf:
    prior:
      min: 0.01
      max: 0.95
    ref: 0.7
    proposal: 0.05
    latex: \rho_\infty
  Omega0_dcdf:
    value: 'lambda omega_b, H0: 1.0 - (omega_b) / (H0/100.0)**2'
    latex: \Omega_{0,\mathrm{dCDF}}
  xi_Neff:
    prior:
      min: 0.0
      max: 1.0
    ref: 0.2
    proposal: 0.05
    latex: \xi_{N_{\mathrm{eff}}}
  m_ncdm:
    value: 0.06
    latex: \sum m_\nu \ [\mathrm{eV}]
sampler:
  mcmc:
    Rminus1_stop: 0.05
    max_tries: 1000
output: dcdf_neff_mcmc
