params:
  omega_b:
    prior:
      min: 0.02
      max: 0.025
    ref:
      dist: norm
      loc: 0.0224
      scale: 0.0002
    proposal: 0.0002
    latex: \omega_\mathrm{b}
    renames:
    - omegabh2
  H0:
    prior:
      min: 64.0
      max: 78.0
    ref:
      dist: norm
      loc: 69.0
      scale: 0.5
    proposal: 0.5
    latex: H_0
  logA:
    prior:
      min: 2.9
      max: 3.25
    ref:
      dist: norm
      loc: 3.05
      scale: 0.01
    proposal: 0.01
    drop: true
    latex: \log(10^{10} A_\mathrm{s})
  A_s:
    value: 'lambda logA: 1e-10*np.exp(logA)'
    derived: true
    latex: A_\mathrm{s}
    renames:
    - As
  n_s:
    prior:
      min: 0.92
      max: 1.03
    ref:
      dist: norm
      loc: 0.98
      scale: 0.005
    proposal: 0.005
    latex: n_\mathrm{s}
    renames:
    - ns
  z_reio:
    prior:
      min: 4.0
      max: 12.0
    ref:
      dist: norm
      loc: 8.0
      scale: 0.5
    proposal: 0.5
    latex: z_\mathrm{reio}
    renames:
    - zrei
  xi_Neff:
    prior:
      min: 0.0
      max: 1.3
    ref:
      dist: norm
      loc: 0.15
      scale: 0.05
    proposal: 0.05
    latex: \xi_{N_\mathrm{eff}}
  dcdf_rho_inf:
    prior:
      min: 0.5
      max: 0.8
    ref:
      dist: norm
      loc: 0.7
      scale: 0.02
    proposal: 0.02
    latex: \rho_\infty
  log10beta:
    prior:
      min: -9.0
      max: -4.0
    ref:
      dist: norm
      loc: -7.0
      scale: 0.3
    proposal: 0.3
    drop: true
    latex: \log_{10}\beta
  dcdf_beta:
    value: 'lambda log10beta: 10**log10beta'
    derived: true
    latex: \beta
  A_planck:
    prior:
      dist: norm
      loc: 1.0
      scale: 0.0025
    ref:
      dist: norm
      loc: 1.0
      scale: 0.002
    proposal: 0.002
    latex: A_\mathrm{planck}
    renames: calPlanck
  m_ncdm:
    value: 0.06
  Omega0_dcdf:
    value: 'lambda omega_b, H0: 1.0 - (omega_b) / (H0/100.0)**2'
    derived: true
    latex: \Omega_\mathrm{dcdf}
  sigma8:
    latex: \sigma_8
    derived: true
  Omega_m:
    latex: \Omega_\mathrm{m}
    derived: true
    renames:
    - omegam
  S8:
    derived: 'lambda sigma8, Omega_m: sigma8 * (Omega_m / 0.3)**0.5'
    latex: S_8
  chi2__BAO:
    latex: \chi^2_\mathrm{BAO}
    derived: true
  chi2__CMB:
    latex: \chi^2_\mathrm{CMB}
    derived: true
  chi2__SN:
    latex: \chi^2_\mathrm{SN}
    derived: true
