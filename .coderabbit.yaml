# Whitelist PRTOE core files only. Do NOT prefix with "!**/*" — that pattern
# makes the local `cr` CLI fail with "All files are ignored".
#
# GitHub full-context workflow (post on PR):
#   @coderabbitai full review
# Persistent learning example:
#   @coderabbitai Learn: Audit all PRTOE core files against CONTEXT.md cross-file contracts.

language: en-US

tone_instructions: >-
  Exhaustive physics audit, not concise summary. Report every violation of
  CONTEXT.md and PRTOE_Working_Formulation.md. Do not stop after first findings;
  continue until all four core files and cross-file contracts are verified.

reviews:
  # Valid profiles: chill | assertive (there is no "custom" profile in CodeRabbit schema)
  profile: assertive

  path_filters:
    - "source/perturbations.c"
    - "source/background.c"
    - "include/perturbations.h"
    - "include/background.h"

  poem: false
  review_details: true
  collapse_walkthrough: false
  changed_files_summary: true

  auto_review:
    auto_incremental_review: false

  path_instructions:
    - path: "**/*"
      instructions: |
        EXHAUSTIVE REVIEW MODE — override brevity bias.

        Before analyzing, load CONTEXT.md and PRTOE_Working_Formulation.md as the
        source of truth. Audit code against those constraints; do not guess.

        Perform a comprehensive sweep of the entire PR diff AND the full content of
        each whitelisted file. Do not stop at the first few findings. Continue until
        you have verified all logical dependencies between background.c, background.h,
        perturbations.c, and perturbations.h.

        If the review is truncated due to length, continue the analysis in a
        follow-up response. Structure output as: Major | Minor | Nit per finding,
        with file:line, contract violated, and proposed fix.

        Secondary verification pass (mandatory before finalizing):
        1. Activation predicates consistent everywhere
        2. F_dot identical in Friedmann, storage, helpers
        3. rho_r budget complete for covariant activation
        4. p_tot_prime includes PRTOE
        5. IC metric coupling + rho_plus_p_shear seeded
        6. Null-limit and unified-dark-sector edge cases

    - path: "**/perturbations.c"
      instructions: |
        Deep line-by-line static analysis of PRTOE perturbation logic per CONTEXT.md.
        Report every logic error, numerical hazard, or gauge inconsistency.
        Cross-check stress-energy against perturbations_derivs and Section 10.4.

    - path: "**/background.c"
      instructions: |
        Deep line-by-line static analysis of PRTOE background evolution per CONTEXT.md.
        Report every instability, predicate mismatch, or feed-through error.
        Cross-check F, F_dot, trans, and Friedmann against Section 2 and 10.5.

    - path: "**/perturbations.h"
      instructions: |
        Audit API surface against source/perturbations.c. Flag every index/gate mismatch.

    - path: "**/background.h"
      instructions: |
        Audit inline helpers and indices against source/background.c and CONTEXT.md
        activation-gate table.

knowledge_base:
  code_guidelines:
    enabled: true
    filePatterns:
      - path: "CONTEXT.md"
        instructions: |
          Primary audit checklist for CodeRabbit. Every review finding must reference
          which contract here is violated. Do not finalize until all contracts checked.
      - path: "PRTOE_Working_Formulation.md"
        instructions: |
          Full physics specification. Use for derivation-level disputes; CONTEXT.md
          for implementation contract checks.