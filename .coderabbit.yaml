# CodeRabbit configuration — re-scoped for a physics-research repo (2026-07-12).
# Philosophy: reviews are ADVISORY, never merge-blocking; docs are living research
# notebooks, not code — review them only for the classes that have proven valuable.
reviews:
  request_changes_workflow: false   # NEVER hold merges hostage — advisory comments only
  high_level_summary: true
  poem: false
  auto_review:
    enabled: true
  path_filters:
    - "!chains/**"                  # runtime artifacts — never review
    - "!tools/PRyMordial/**"        # vendored external code
    - "!*.launchlog"
  path_instructions:
    - path: "docs/**"
      instructions: >
        These are living physics research notebooks with an internal status-label system
        (PRODUCTION / BANKED / EXPLORATORY / FUDGED / interpretation-grade — defined in
        PRTOE_INDEX.md). Review ONLY for: (1) numerical contradictions BETWEEN files,
        (2) factual errors in cited literature values, (3) claims whose stated status
        label contradicts their content (e.g. a bet described as derived). Do NOT flag:
        markdown lint or heading spacing, prose style, speculative content that carries
        an explicit status label, or superseded passages inside the chronological
        lab-log files (PRTOE_DERIVATION_HUNT.md, PRTOE_FAILURES_LEDGER.md,
        PRTOE_me_trigger.md, PRTOE_gate0_qft_derivation.md, PRTOE_room1_*.md) — those
        files intentionally preserve dead versions in place, marked by [SUPERSEDED]
        stamps and a reader's rule at the top.
    - path: "source/**"
      instructions: "Full-strength code review — this is the CLASS C engine; correctness is critical."
    - path: "scripts/**"
      instructions: "Full-strength code review — the dashboard backend."
