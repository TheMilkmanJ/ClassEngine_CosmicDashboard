theory:
  classy:
    stop_at_error: false
    extra_args:
      use_dcdf: 'yes'
      varying_fundamental_constants: instantaneous
      varying_alpha: 1.0
      varying_transition_redshift: 50.0
      dcdf_deltam_mode: 1
      dcdf_z_rad_onset: 4.0e7
      dcdf_conv_at: 0.6
      dcdf_conv_n: 4.0
      non_linear: halofit
      output: mPk,tCl,pCl,lCl
      modes: s
      N_ur: 2.0328
      N_ncdm: 1
      T_ncdm: 0.71611
      l_max_scalars: 9000
      lensing: 'yes'
params:
  YHe:
    value: 'lambda omega_b, varying_me: 0.2471 + 0.0096*np.log(omega_b/0.02236) + 0.00176009*((varying_me-1)*100) + (-5.105e-05)*((varying_me-1)*100)**2'  # m_e=1 at BBN (condensate not formed yet); recomb shift still applied by CLASS varconst
    derived: false
  omega_b:
    prior: {min: 0.0200, max: 0.0250}
    ref: {dist: norm, loc: 0.022757, scale: 0.0002}
    proposal: 0.0002
    latex: \omega_\mathrm{b}
  H0:
    prior: {min: 64.0, max: 78.0}
    ref: {dist: norm, loc: 69.613, scale: 0.5}
    proposal: 0.5
    latex: H_0
  logA:
    prior: {min: 2.90, max: 3.25}
    ref: {dist: norm, loc: 3.059448, scale: 0.01}
    proposal: 0.01
    drop: true
    latex: \log(10^{10} A_\mathrm{s})
  A_s:
    value: 'lambda logA: 1e-10*np.exp(logA)'
    derived: true
    latex: A_\mathrm{s}
  n_s:
    prior: {min: 0.92, max: 1.03}
    ref: {dist: norm, loc: 0.970999, scale: 0.005}
    proposal: 0.005
    latex: n_\mathrm{s}
  z_reio:
    prior: {min: 4.0, max: 12.0}
    ref: {dist: norm, loc: 8.363414, scale: 0.5}
    proposal: 0.5
    latex: z_\mathrm{reio}
  xi_Neff: 0.0
  dcdf_rho_inf:
    prior: {min: 0.50, max: 0.80}
    ref: {dist: norm, loc: 0.701221, scale: 0.02}
    proposal: 0.02
    latex: \rho_\infty
  dcdf_conv_g:
    prior: {min: 0.0, max: 1.0}
    ref: 0.12
    proposal: 0.03
    latex: g_{\rm conv}
  dcdf_floor_thaw:
    prior: {min: 0.0, max: 0.30}
    ref: 0.12
    proposal: 0.03
    latex: (1+w_{\rm fl,0})
  varying_me: 1.01232
  A_planck:
    prior: {dist: norm, loc: 1.0, scale: 0.0025}
    ref: {dist: norm, loc: 1.0, scale: 0.002}
    proposal: 0.002
    latex: A_\mathrm{planck}
  A_act:
    prior: {dist: norm, loc: 1.0, scale: 0.003}
    ref: {dist: norm, loc: 1.00071, scale: 0.002}
    proposal: 0.002
    latex: A_\mathrm{ACT}
  P_act:
    prior: {min: 0.9, max: 1.1}
    ref: {dist: norm, loc: 1.00327, scale: 0.005}
    proposal: 0.005
    latex: P_\mathrm{ACT}
  Tcal:
    prior: {dist: norm, loc: 1.0, scale: 0.00449}
    ref: {dist: norm, loc: 0.996386, scale: 0.003}
    proposal: 0.003
    latex: T_\mathrm{cal}
  Ecal:
    prior: {dist: norm, loc: 1.0, scale: 0.00727}
    ref: {dist: norm, loc: 1.00563, scale: 0.005}
    proposal: 0.005
    latex: E_\mathrm{cal}
  m_ncdm:
    prior: {min: 0.0, max: 0.6}
    ref: {dist: norm, loc: 0.0654, scale: 0.02}
    proposal: 0.02
    latex: \Sigma m_\nu
  Omega0_dcdf:
    value: 'lambda omega_b, H0: 1.0 - (omega_b) / (H0/100.0)**2'
    derived: true
    latex: \Omega_\mathrm{dcdf}
  sigma8:
    latex: \sigma_8
  Omega_m:
    latex: \Omega_\mathrm{m}
  S8:
    derived: 'lambda sigma8, Omega_m: sigma8 * (Omega_m / 0.3)**0.5'
    latex: S_8

prior:
  bbn: "lambda omega_b, varying_me: -0.5*( ((0.2471 + 0.0096*__import__('numpy').log(omega_b/0.02236) + 0.00176009*((varying_me-1)*100) + (-5.105e-05)*((varying_me-1)*100)**2 - 0.2449)/0.0040)**2 + ((2.53e-5*__import__('numpy').exp(-1.6*__import__('numpy').log(omega_b/0.02236)) + (0.01816831*((varying_me-1)*100) + (-0.00242341)*((varying_me-1)*100)**2)*1e-5 - 2.527e-5)/0.030e-5)**2 )"

sampler:
  mcmc:
    max_tries: 2000
    Rminus1_stop: 0.1
    Rminus1_cl_stop: 0.2
    learn_proposal: True
    # 2026-07-20: the first two launches collapsed. Cobaya's default
    # learn_proposal_Rminus1_max_early = 30 let the chain learn a proposal
    # covariance while R-1 sat at 8-27 -- i.e. from a chain that had not
    # converged at all. The learned sigmas came back 10-45x SMALLER than the
    # proposal widths below (n_s 0.00024 vs 0.005; m_ncdm 0.00044 vs 0.02),
    # so the chain took ever-tinier steps and stopped exploring: 6936 samples
    # covered only H0 68.20-69.45 out of a 14-wide prior, with R-1 = 24.9.
    # Fix: seed the covariance at the physical widths, and only ever learn
    # from a chain that has actually converged (both gates at 2).
    learn_proposal_Rminus1_max: 2.0
    learn_proposal_Rminus1_max_early: 2.0
    covmat: chains/routeD_seed.covmat
    burn_in: 100

