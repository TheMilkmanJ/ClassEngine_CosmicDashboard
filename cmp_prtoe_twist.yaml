packages_path: /home/themilkmanj/cobaya_packages_clean
output: chains/cmp_prtoe_twist
# TWIST-FLOOR proxy: standard CDM + CPL(w0,wa) fluid DE = the thawing twist floor
# (docs/PRTOE_cyclic_torus_genesis.md), + the varying-m_e dyad. DESI BAO swapped in
# for SDSS DR12. Tests: does thawing-fluid + dyad beat LCDM, and does (w0,wa) land in
# the twist-floor forced region (w0>-1, wa<0)?
likelihood:
  planck_2018_lowl.TT: null
  planck_2018_lowl.EE: null
  planck_2018_highl_plik.TTTEEE_lite: null
  planck_2018_lensing.clik: null
  bao.desi_2024_bao_all: null
  sn.pantheonplusshoes: null
  act_dr6:
    class: candl.interface.CandlCobayaLikelihood
    data_set_file: /home/themilkmanj/candl_data/candl_data/ACT_DR6_CMB_only_v0/ACT_DR6_CMB_only.yaml
    clear_internal_priors: true
  spt3g_lite:
    class: candl.interface.CandlCobayaLikelihood
    data_set_file: /home/themilkmanj/candl_data/candl_data/SPT3G_2018_TTTEEE_v0/SPT3G_2018_TTTEEE_lite.yaml
    clear_internal_priors: true
theory:
  classy:
    stop_at_error: false
    extra_args:
      Omega_Lambda: 0.0
      fluid_equation_of_state: CLP
      cs2_fld: 1.0
      varying_fundamental_constants: instantaneous
      varying_alpha: 1.0
      varying_transition_redshift: 50.0
      non_linear: halofit
      output: mPk,tCl,pCl,lCl
      modes: s
      N_ur: 2.0328
      N_ncdm: 1
      T_ncdm: 0.71611
      l_max_scalars: 9000
      lensing: 'yes'
params:
  YHe:
    value: 'lambda omega_b: 0.2471 + 0.0096*np.log(omega_b/0.02236)'  # m_e=1 at BBN (data-required heal, #29); condensate absent at BBN
    derived: false
  omega_b:
    prior: {min: 0.0200, max: 0.0250}
    ref: {dist: norm, loc: 0.022757, scale: 0.0002}
    proposal: 0.0002
    latex: \omega_\mathrm{b}
  omega_cdm:
    prior: {min: 0.100, max: 0.135}
    ref: {dist: norm, loc: 0.1185, scale: 0.001}
    proposal: 0.001
    latex: \omega_\mathrm{cdm}
  H0:
    prior: {min: 64.0, max: 78.0}
    ref: {dist: norm, loc: 69.613, scale: 0.5}
    proposal: 0.5
    latex: H_0
  logA:
    prior: {min: 2.90, max: 3.25}
    ref: {dist: norm, loc: 3.059448, scale: 0.01}
    proposal: 0.01
    drop: true
    latex: \log(10^{10} A_\mathrm{s})
  A_s:
    value: 'lambda logA: 1e-10*np.exp(logA)'
    derived: true
    latex: A_\mathrm{s}
  n_s:
    prior: {min: 0.92, max: 1.03}
    ref: {dist: norm, loc: 0.970999, scale: 0.005}
    proposal: 0.005
    latex: n_\mathrm{s}
  z_reio:
    prior: {min: 4.0, max: 12.0}
    ref: {dist: norm, loc: 8.363414, scale: 0.5}
    proposal: 0.5
    latex: z_\mathrm{reio}
  w0_fld:
    prior: {min: -1.20, max: -0.40}
    ref: {dist: norm, loc: -0.80, scale: 0.05}
    proposal: 0.05
    latex: w_0
  wa_fld:
    prior: {min: -3.0, max: 1.0}
    ref: {dist: norm, loc: -0.40, scale: 0.15}
    proposal: 0.15
    latex: w_a
  varying_me: 1.01232
  A_planck:
    prior: {dist: norm, loc: 1.0, scale: 0.0025}
    ref: {dist: norm, loc: 1.0, scale: 0.002}
    proposal: 0.002
    latex: A_\mathrm{planck}
  A_act:
    prior: {dist: norm, loc: 1.0, scale: 0.003}
    ref: {dist: norm, loc: 1.00071, scale: 0.002}
    proposal: 0.002
    latex: A_\mathrm{ACT}
  P_act:
    prior: {min: 0.9, max: 1.1}
    ref: {dist: norm, loc: 1.00327, scale: 0.005}
    proposal: 0.005
    latex: P_\mathrm{ACT}
  Tcal:
    prior: {dist: norm, loc: 1.0, scale: 0.00449}
    ref: {dist: norm, loc: 0.996386, scale: 0.003}
    proposal: 0.003
    latex: T_\mathrm{cal}
  Ecal:
    prior: {dist: norm, loc: 1.0, scale: 0.00727}
    ref: {dist: norm, loc: 1.00563, scale: 0.005}
    proposal: 0.005
    latex: E_\mathrm{cal}
  m_ncdm:
    prior: {min: 0.0, max: 0.6}
    ref: {dist: norm, loc: 0.0654, scale: 0.02}
    proposal: 0.02
    latex: \Sigma m_\nu
  sigma8:
    latex: \sigma_8
  Omega_m:
    latex: \Omega_\mathrm{m}
  S8:
    derived: 'lambda sigma8, Omega_m: sigma8 * (Omega_m / 0.3)**0.5'
    latex: S_8

prior:
  bbn: "lambda omega_b: -0.5*( ((0.2471 + 0.0096*__import__('numpy').log(omega_b/0.02236) - 0.2449)/0.0040)**2 + ((2.53e-5*__import__('numpy').exp(-1.6*__import__('numpy').log(omega_b/0.02236)) - 2.527e-5)/0.030e-5)**2 )"

sampler:
  mcmc:
    max_tries: 2000
    Rminus1_stop: 0.1
    Rminus1_cl_stop: 0.2
    learn_proposal: True
    burn_in: 100
